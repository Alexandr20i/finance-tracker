syntax = "proto3"; // Версия синтаксиса — всегда proto3 в современных проектах

package transaction; // Пакет — как namespace в Go, нужен чтобы не было конфликтов имён

// Куда генерировать Go код
option go_package = "github.com/Alexandr20i/finance-tracker/gen/transaction";

// enum — перечисление, как const iota в Go но с именами
enum TransactionType {
  INCOME  = 0;
  EXPENSE = 1;
}

message Transaction {
  int64  id          = 1;
  int64  user_id     = 2;
  double amount      = 3;
  TransactionType type = 4;
  string category    = 5;
  string description = 6;
  string date        = 7; // YYYY-MM-DD
  string created_at  = 8;
}

message CreateTransactionRequest {
  int64           user_id     = 1;
  double          amount      = 2;
  TransactionType type        = 3;
  string          category    = 4;
  string          description = 5;
  string          date        = 6;
}

message CreateTransactionResponse {
  Transaction transaction = 1;
}

message GetTransactionRequest {
  int64 id      = 1;
  int64 user_id = 2;
}

message ListTransactionsRequest {
  int64  user_id  = 1;
  string from     = 2;
  string to       = 3;
  string category = 4;
  string type     = 5;
}

message DeleteTransactionRequest {
  int64 id      = 1;
  int64 user_id = 2;
}

message DeleteTransactionResponse {
  bool success = 1;
}

message GetBalanceRequest {
  int64  user_id = 1;
  string from    = 2;
  string to      = 3;
}

message GetBalanceResponse {
  double total_income  = 1;
  double total_expense = 2;
  double balance       = 3;
}

message CategoryTotal {
  string category   = 1;
  double amount     = 2;
  double percentage = 3;
  int32  count      = 4;
}

message GetCategoryTotalsRequest {
  int64  user_id = 1;
  string from    = 2;
  string to      = 3;
}

message GetCategoryTotalsResponse {
  repeated CategoryTotal categories = 1;
}

service TransactionService {
  rpc CreateTransaction(CreateTransactionRequest)     returns (CreateTransactionResponse);
  rpc GetTransaction(GetTransactionRequest)           returns (Transaction);
  rpc ListTransactions(ListTransactionsRequest)       returns (stream Transaction);
  rpc DeleteTransaction(DeleteTransactionRequest)     returns (DeleteTransactionResponse);
  rpc GetBalance(GetBalanceRequest)                   returns (GetBalanceResponse);
  rpc GetCategoryTotals(GetCategoryTotalsRequest)     returns (GetCategoryTotalsResponse);
}